<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ratride</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1e1e2e; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="ratride"></canvas>
  <script type="module">
    import init, { RatRide } from './pkg/ratride_web.js';

    async function main() {
      await init();

      const canvas = document.getElementById('ratride');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });

      // Fetch example markdown or use inline fallback
      let md;
      try {
        const resp = await fetch('../examples/test.md');
        if (resp.ok) md = await resp.text();
      } catch (_) {}

      if (!md) {
        md = `# Hello ratride-web

This is a slide rendered in the browser via WASM + Canvas.

---

## Slide 2

- Keyboard navigation: arrow keys
- Transitions work too!

---

<!-- transition: fade -->

## Fade transition

This slide fades in.
`;
      }

      RatRide.run(md);
    }

    main();
  </script>
</body>
</html>
