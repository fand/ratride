<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ratride</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1e1e2e; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="ratride"></canvas>
  <script type="module">
    import init, { RatRide } from './pkg/ratride_web.js';

    async function main() {
      await init();

      const canvas = document.getElementById('ratride');
      const dpr = window.devicePixelRatio || 1;

      function resizeCanvas() {
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      // Fetch example markdown or use inline fallback
      const mdPath = '../examples/test.md';
      let md;
      try {
        const resp = await fetch(mdPath);
        if (resp.ok) md = await resp.text();
      } catch (_) {}

      if (!md) {
        md = `# Hello ratride-web

This is a slide rendered in the browser via WASM + Canvas.

---

## Slide 2

- Keyboard navigation: arrow keys
- Transitions work too!

---

<!-- transition: fade -->

## Fade transition

This slide fades in.
`;
      }

      // Resolve base URL for relative image paths in the markdown
      const baseUrl = new URL(mdPath, window.location.href).href.replace(/[^/]*$/, '');
      RatRide.run(md, undefined, undefined, undefined, baseUrl);
    }

    main();
  </script>
</body>
</html>
