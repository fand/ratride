name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build WASM
        run: cd ratride-web && wasm-pack build . --target web --out-dir pkg

      - name: Install ratride-web deps
        run: cd ratride-web && npm install

      - name: Install docs deps
        run: cd docs && npm install

      - name: Build docs
        run: cd docs && npx vite build --base /ratride/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
